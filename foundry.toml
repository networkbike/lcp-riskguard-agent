# Foundry configuration for the LCP RiskGuard Service Agent.
# This project uses forge test to verify the runner output shape
# against fixtures (test/fixtures/*.json). The fixtures are
# regenerated via `bash test/capture-output.sh` after any change
# to scripts/run.sh.
#
# We do NOT pin a solc version. The Solidity tests only use
# standard ABI decoding + Vm cheatcodes; they don't reference
# compiler-specific features.

[profile.default]
src       = "src"
test      = "test"
out       = "out"
libs      = ["lib"]
optimizer = true
optimizer_runs = 200
verbosity = 2

# Allow forge tests to read JSON fixtures from test/fixtures/.
# The fixture files are generated by `bash test/capture-output.sh`.
fs_permissions = [{ access = "read", path = "./test/fixtures" }]
